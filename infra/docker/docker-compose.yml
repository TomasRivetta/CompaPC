services:
  db:
    image: postgres:16
    container_name: compapc_db
    restart: always
    environment:
      POSTGRES_DB: compapc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - compapc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d compapc"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: compapc_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/compapc
      CORS_ORIGINS: http://localhost:3000,http://web:3000
    ports:
      - "8000:8000"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: compapc_web
    restart: always
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://api:8000
    ports:
      - "3000:3000"

  scraper:
    build:
      context: ../..
      dockerfile: services/scrapers/Dockerfile
    container_name: compapc_scraper
    profiles: ["scraper"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/compapc

volumes:
  compapc_postgres_data:
