version: "3.9"

services:
  db:
    image: postgres:16
    container_name: compapc_db
    restart: always
    environment:
      POSTGRES_DB: compapc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - compapc_postgres_data:/var/lib/postgresql/data

volumes:
  compapc_postgres_data: